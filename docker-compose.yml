version: '3.8'

networks:
  wudong-net:
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    networks: [wudong-net]
    ports: ['3306:3306']
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: wudong_group4
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks: [wudong-net]
    ports: ['6379:6379']

  backend:
    build: ./backend
    image: wudong-backend:latest
    networks: [wudong-net]
    ports: ['3000:3000']
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=wudong_group4

  frontend:
    build: ./web
    image: wudong-frontend:latest
    networks: [wudong-net]
    ports: ['80:80']
    depends_on: [backend]

  admin:
    build: ./admin
    image: wudong-admin:latest
    networks: [wudong-net]
    ports: ['81:80']
    depends_on: [backend]

volumes:
  mysql-data:
